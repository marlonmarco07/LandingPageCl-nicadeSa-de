<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clínica Vida Saudável</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f6f9;
        }

        header {
            background: linear-gradient(90deg, #2c7be5, #1a5edb);
            color: white;
            padding: 30px;
            text-align: center;
        }

        section {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            border-bottom: 2px solid #2c7be5;
            padding-bottom: 5px;
        }

        img {
            width: 250px;
            border-radius: 10px;
            margin: 10px;
        }

        .equipe {
            display: flex;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            flex: 1;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background-color: #2c7be5;
            color: white;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #1a5edb;
        }
    </style>
</head>

<body>

<header>
    <h1>Clínica Vida Saudável</h1>
    <p>Cuidando da sua saúde com qualidade</p>
</header>

<section>
    <h2>Nossos Serviços</h2>
    <p>Oferecemos atendimento médico, exames laboratoriais e aconselhamento nutricional.</p>

    <img src="medico.png" alt="Consulta médica">
    <img src="exame.png" alt="Exames médicos">
</section>

<section>
    <h2>Nossa Equipe</h2>
    <div class="equipe">
        <div class="card">
            <h3>Dr. João Silva</h3>
            <p>Médico Clínico</p>
        </div>
        <div class="card">
            <h3>Dra. Ana Souza</h3>
            <p>Nutricionista</p>
        </div>
        <div class="card">
            <h3>Carlos Lima</h3>
            <p>Enfermeiro</p>
        </div>
    </div>
</section>

<section>
    <h2>Contato</h2>
    <form>
        <input type="text" placeholder="Nome">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Cidade">
        <input type="text" placeholder="Estado">
        <input type="submit" value="Enviar">
    </form>
</section>

</body>
</html>
