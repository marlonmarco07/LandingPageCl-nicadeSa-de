<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clínica Vida Saudável</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #2c7be5;
            color: white;
            padding: 20px;
            text-align: center;
        }
        section {
            padding: 20px;
        }
        img {
            width: 300px;
            margin: 10px;
        }
        .equipe {
            display: flex;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 300px;
        }
        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
    </style>
</head>
<body>

<header>
    <h1>Clínica Vida Saudável</h1>
    <p>Cuidando da sua saúde com qualidade</p>
</header>

<section>
    <h2>Nossos Serviços</h2>
    <p>Oferecemos atendimento médico, exames laboratoriais e aconselhamento nutricional.</p>

    <img src="https://via.placeholder.com/300" alt="Consulta médica">
    <img src="https://via.placeholder.com/300" alt="Exames">
</section>

<section>
    <h2>Nossa Equipe</h2>
    <div class="equipe">
        <div class="card">
            <h3>Dr. João Silva</h3>
            <p>Médico Clínico</p>
        </div>
        <div class="card">
            <h3>Dra. Ana Souza</h3>
            <p>Nutricionista</p>
        </div>
        <div class="card">
            <h3>Carlos Lima</h3>
            <p>Enfermeiro</p>
        </div>
    </div>
</section>

<section>
    <h2>Contato</h2>
    <form>
        <input type="text" placeholder="Nome">
        <input type="email" placeholder="Email">
        <input type="text" placeholder="Cidade">
        <input type="text" placeholder="Estado">
        <input type="submit" value="Enviar">
    </form>
</section>

</body>
</html>
